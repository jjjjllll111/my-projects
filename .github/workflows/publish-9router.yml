name: Build 9router CLI and Upload to Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to build from 9router-private
        required: true
        default: master

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NODE_OPTIONS: --max-old-space-size=12288
    steps:
      - name: Checkout 9router from private repository
        uses: actions/checkout@v4
        with:
          repository: jjjjllll111/9router-private
          ref: ${{ github.event.inputs.ref || 'master' }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Build CLI
        run: |
          cd cli
          npm run build
          echo "✓ CLI build completed"

      - name: Verify build output
        run: |
          if [ ! -d "cli/app" ]; then
            echo "ERROR: cli/app/ directory not created"
            exit 1
          fi
          echo "✓ Build verification successful"
          echo "cli/app/ size: $(du -sh cli/app/ | cut -f1)"
          ls -la cli/app/ | head -15

      - name: Create distribution archive
        run: |
          cd cli
          tar -czf ../9router-cli.tar.gz app cli.js hooks src README.md LICENSE 2>/dev/null || tar -czf ../9router-cli.tar.gz app cli.js hooks src
          cd ..
          ARCHIVE_SIZE=$(du -h 9router-cli.tar.gz | cut -f1)
          echo "✓ Archive created: 9router-cli.tar.gz (${ARCHIVE_SIZE})"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG=cli-latest
          REPO=jjjjllll111/9router-private

          # Create or verify release exists
          gh release view $TAG --repo $REPO || \
            gh release create $TAG --repo $REPO \
              --title "9Router CLI Latest" \
              --notes "Auto-build from ${{ github.event.inputs.ref || 'master' }} branch"

          # Upload and overwrite existing archive
          gh release upload $TAG 9router-cli.tar.gz --repo $REPO --clobber

          echo "✓ Release updated successfully at https://github.com/$REPO/releases/tag/$TAG"
