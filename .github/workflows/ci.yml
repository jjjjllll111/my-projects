name: Build OmniRoute for HuggingFace

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to build
        required: true
        default: main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NODE_OPTIONS: --max-old-space-size=12288
    steps:
      - name: Checkout OmniRoute
        uses: actions/checkout@v4
        with:
          repository: jjjjllll111/omniroute-private
          ref: ${{ github.event.inputs.ref || 'main' }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build opencode plugin
        run: |
          if [ -d "@omniroute/opencode-plugin" ]; then
            echo "Building opencode plugin..."
            cd @omniroute/opencode-plugin
            npm install --no-audit --no-fund
            npm run build
            cd ../..
          else
            echo "Opencode plugin not found, skipping"
          fi

      - name: Build OmniRoute (full release build)
        timeout-minutes: 25
        run: npm run build:release
        env:
          NEXT_DISABLE_SOURCEMAPS: 'true'
          GENERATE_SOURCEMAP: 'false'

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not created"
            exit 1
          fi
          echo "Build verification successful"
          echo "dist/ size: $(du -sh dist/ | cut -f1)"
          ls -la dist/ | head -20

      - name: Create distribution archive
        run: |
          cd dist
          tar -czf ../omniroute-dist.tar.gz .
          cd ..
          ARCHIVE_SIZE=$(du -h omniroute-dist.tar.gz | cut -f1)
          echo "Archive created: omniroute-dist.tar.gz (${ARCHIVE_SIZE})"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG=hf-latest
          gh release view $TAG --repo jjjjllll111/omniroute-private || gh release create $TAG --repo jjjjllll111/omniroute-private --title "HF Latest" --notes "Auto-build"
          gh release upload $TAG omniroute-dist.tar.gz --repo jjjjllll111/omniroute-private --clobber
          echo "Release updated successfully"

      - name: Wait for release to propagate
        run: sleep 60

      - name: Restart wangtao318 runner action
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 停止当前运行的 action
          CURRENT_RUN=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/wangtao318/runner/actions/runs?status=in_progress&per_page=1" | \
            jq -r '.workflow_runs[0].id')

          if [ "$CURRENT_RUN" != "null" ] && [ -n "$CURRENT_RUN" ]; then
            curl -X POST -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/wangtao318/runner/actions/runs/$CURRENT_RUN/cancel"
            echo "Cancelled run: $CURRENT_RUN"
            sleep 10
          fi

          # 触发新的 runner action
          curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/wangtao318/runner/actions/workflows/runner-run.yml/dispatches" \
            -d '{"ref":"main"}'

          echo "✓ Triggered new wangtao318/runner action"