name: Build and Deploy to HuggingFace

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build project
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          OMNIROUTE_USE_TURBOPACK: '1'
          NEXT_DISABLE_SOURCEMAPS: 'true'
          GENERATE_SOURCEMAP: 'false'

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist/ directory not found"
            exit 1
          fi
          echo "Build successful"
          du -sh dist/

      - name: Clone HF Space repo
        env:
          HF_TOKEN: \${{ secrets.HF_TOKEN }}
        run: |
          git clone https://VVVVY001:\@huggingface.co/spaces/VVVVY001/myrouter hf-space

      - name: Update HF Space with new build
        run: |
          cd hf-space
          rm -rf dist/
          cp -r ../dist ./
          
      - name: Commit and push to HF Space
        run: |
          cd hf-space
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            COMMIT_TIME=\$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "Deploy build from \${{ github.sha }} at \"
            git push
            echo "Deployed to HuggingFace Space"
          fi
